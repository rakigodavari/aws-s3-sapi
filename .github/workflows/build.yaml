# This is a basic workflow to help you get started with Actions
name: Publish API Catalogs to Exchange

# Triggers the workflow on push or pull request events but only for the master branch
on:
  push:
    branches: [ dev ]
  #workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    # Build Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4
        
      - name: Login to Anypoint
        run: |
          anypoint-cli-v4 login \
          --client_id ${{ secrets.CONNECTED_APP_CLIENT_ID }} \
          --client_secret ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}

      - name: Deploy to CloudHub
        run: |
          anypoint-cli-v4 runtime-mgr application deploy \
          aws-s3-s \
          target/aws-s3-s-1.0.0-mule-application.jar \
          --runtime 4.4.0 \
          --region us-east-2 \
          --property env=Sandbox
