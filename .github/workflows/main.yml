name: Anypoint CI/CD with Maven and GitHub Actions

on:
  push:
    branches:
      - main # Triggers the workflow on push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven Build
        run: mvn clean package -DskipMunitTests=true # Skip MUnit tests for build job, run in separate job for CI/CD pipeline

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-artifact
          path: target/*.jar
